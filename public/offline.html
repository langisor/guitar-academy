<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Guitar Academy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
    }
    h1 { font-size: 2rem; margin-bottom: 1rem; }
    p { opacity: 0.9; margin-bottom: 2rem; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    button {
      background: white;
      color: #6366f1;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎸</div>
    <h1>You're Offline</h1>
    <p>It looks like you lost your internet connection. Don't worry, your guitar skills are still with you!</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
